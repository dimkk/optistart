name: Release Test Nightly

on:
  push:
    branches:
      - test

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-test-nightly
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip nightly release]') }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_sha: ${{ steps.create_tag.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run repository validation
        run: bash scripts/run-main-pr-checks.sh

      - name: Apply nightly version bump
        id: release_meta
        shell: bash
        run: |
          node scripts/prepare-release.mjs bump --apply --channel nightly > release-meta.json
          cat release-meta.json
          version="$(node -e 'const fs=require("node:fs"); const data=JSON.parse(fs.readFileSync("release-meta.json","utf8")); process.stdout.write(data.version)')"
          tag="$(node -e 'const fs=require("node:fs"); const data=JSON.parse(fs.readFileSync("release-meta.json","utf8")); process.stdout.write(data.tag)')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Commit nightly version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/release-manifest.json ui/apps/server/package.json ui/apps/web/package.json ui/apps/desktop/package.json ui/apps/marketing/package.json ui/packages/contracts/package.json ui/packages/shared/package.json
          git commit -m "chore(release): prepare ${{ steps.release_meta.outputs.tag }} [skip nightly release]"

      - name: Create nightly tag
        id: create_tag
        shell: bash
        run: |
          git tag -a "${{ steps.release_meta.outputs.tag }}" -m "Release ${{ steps.release_meta.outputs.tag }}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push nightly commit and tag
        run: git push origin HEAD:test "refs/tags/${{ steps.release_meta.outputs.tag }}"

  release:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install runtime build dependencies
        run: bun install --cwd ui --frozen-lockfile --ignore-scripts

      - name: Build runtime assets
        run: cd ui && bun run build:runtime

      - name: Prepare release bundle
        shell: bash
        run: |
          mkdir -p release-assets
          node scripts/build-release-bundle.mjs --output-dir release-assets
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          cp scripts/release-manifest.json release-assets/release-manifest.json

      - name: Publish nightly GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          name: OptiDev Nightly v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          prerelease: true
          make_latest: false
          files: |
            release-assets/*.tar.gz
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/release-manifest.json
          fail_on_unmatched_files: true
