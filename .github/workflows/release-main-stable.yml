name: Release Main Stable

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main-stable
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip stable release]') }}
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_sha: ${{ steps.create_tag.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run repository validation
        run: bash scripts/run-main-pr-checks.sh

      - name: Apply stable version bump
        id: release_meta
        shell: bash
        run: |
          node scripts/prepare-release.mjs bump --apply --channel stable > release-meta.json
          cat release-meta.json
          version="$(node -e 'const fs=require("node:fs"); const data=JSON.parse(fs.readFileSync("release-meta.json","utf8")); process.stdout.write(data.version)')"
          tag="$(node -e 'const fs=require("node:fs"); const data=JSON.parse(fs.readFileSync("release-meta.json","utf8")); process.stdout.write(data.tag)')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Commit stable version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/release-manifest.json ui/apps/server/package.json ui/apps/web/package.json ui/apps/desktop/package.json ui/apps/marketing/package.json ui/packages/contracts/package.json ui/packages/shared/package.json
          git commit -m "chore(release): prepare ${{ steps.release_meta.outputs.tag }} [skip stable release]"

      - name: Create stable tag
        id: create_tag
        shell: bash
        run: |
          git tag -a "${{ steps.release_meta.outputs.tag }}" -m "Release ${{ steps.release_meta.outputs.tag }}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push stable commit and tag
        run: git push origin HEAD:main "refs/tags/${{ steps.release_meta.outputs.tag }}"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            target: nsis
            arch: x64
    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install UI dependencies
        run: bun install --cwd ui --frozen-lockfile --ignore-scripts

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          cd ui
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.prepare.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              args+=(--signed)
            fi
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            if has_all \
              "$AZURE_TENANT_ID" \
              "$AZURE_CLIENT_ID" \
              "$AZURE_CLIENT_SECRET" \
              "$AZURE_TRUSTED_SIGNING_ENDPOINT" \
              "$AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" \
              "$AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" \
              "$AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"; then
              args+=(--signed)
            fi
          fi

          bun run dist:desktop:artifact -- "${args[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "ui/release/*.dmg" \
            "ui/release/*.zip" \
            "ui/release/*.AppImage" \
            "ui/release/*.exe" \
            "ui/release/*.blockmap" \
            "ui/release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stable-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stable-*
          merge-multiple: true
          path: release-assets

      - name: Prepare source assets
        shell: bash
        run: |
          mkdir -p release-assets
          prefix="optid-${{ needs.prepare.outputs.version }}"
          git archive --format=tar.gz --prefix="$prefix/" -o "release-assets/${prefix}.tar.gz" "${{ needs.prepare.outputs.release_sha }}"
          git archive --format=zip --prefix="$prefix/" -o "release-assets/${prefix}.zip" "${{ needs.prepare.outputs.release_sha }}"
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          cp scripts/release-manifest.json release-assets/release-manifest.json

      - name: Publish stable GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          name: OptiDev v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/latest*.yml
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/release-manifest.json
          fail_on_unmatched_files: true
